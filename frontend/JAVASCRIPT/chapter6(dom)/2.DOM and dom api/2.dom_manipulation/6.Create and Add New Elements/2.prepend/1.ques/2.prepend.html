<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="list">
        <li>Item 1</li>
    </ul>
<button id="btn">Add Item</button>

<script>
    // firsty we access an element in which i want to add new element or li
        let element= document.querySelector("ul")
            console.log(element)
    // access an button
        let btm= document.getElementById("btn")
           btm.addEventListener( "click",()=>{
                               //  creating element which is i want to add
                                let ele=document.createElement("li")
                                    console.log(ele)
                                    ele.innerText="item 2"
                                    element.prepend(ele)
                                })

</script>
</body>
</html>
