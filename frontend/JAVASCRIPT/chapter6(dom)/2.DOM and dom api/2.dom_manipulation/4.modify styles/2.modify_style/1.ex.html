<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./2.ex.css">
</head>
<body>
    <div id="name" class="box">this is priyanshu</div>
    <script>
        let element=document.querySelector("div")
                console.log(element)
        let style= window.getComputedStyle(element)
                console.log(style)
                console.log(style.backgroundColor)
                console.log(style.width)
                console.log(style.height)
                console.log(style.border)
        // console.log(element.style.backgroundColor) this is not working because css in a external file , only support on inlne style
