<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
      .highlight{
          background-color:blue;
          color:white;
        }
  </style>
</head>
<body>

    <p id="para" class="highlight">This is a paragraph</p>
    <button id="bigfont">big font</button>
    <button id="bold">bold</button>
    <button id="border">border</button>
    <script>
      //Getting the paragraph element
      let para = document.querySelector("#para");

      //adding event listener(event handler) for click event on the "big font" button
        let element=document.querySelector("#bigfont")
        element.addEventListener("click", function() {
            para.style.fontSize = "20px";
        })
      
     //adding event listener(event handler) for click event on the "bold" button
        let boldButton = document.querySelector("#bold");
        boldButton.addEventListener("click", function() {
            para.style.fontWeight = "bold";
        });

     //adding event listener(event handler) for click event on the "border" button
        let borderButton = document.querySelector("#border");
        borderButton.addEventListener("click", function() {
            para.style.border = "2px solid black";
            para.style.borderRadius = "5px";
        });

    </script>

</body>
</html>
