<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airbnb Host</title>
<link rel="stylesheet" href="/register.css">
</head>

<body>
<header>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/host/add-home">Add Home</a></li>
    </ul>
  </nav>
</header>

<div class="container">
  <h1>List Your Home</h1>

  <form action="/host/added" method="POST">

    <!-- Basic Info -->
    <div class="section">
      <h2>Basic Information</h2>
      <input type="text" name="homeName" placeholder="Home Name" required>
      <input type="text" name="Location" placeholder="Location" required>

      <div class="grid">
        <input type="number" name="pricePerNight" placeholder="Price per night">
        <input type="number" name="rating" placeholder="Rating (1-10)">
      </div>

      <input type="number" name="reviews" placeholder="Number of reviews">
    </div>

    <!-- Images -->
    <div class="section">
      <h2>Photos</h2>
      <input type="text" name="photourl" placeholder="Main Photo URL">

      <div class="grid">
        <input type="text" name="images[]" placeholder="Image URL 1">
        <input type="text" name="images[]" placeholder="Image URL 2">
        <input type="text" name="images[]" placeholder="Image URL 3">
      </div>
    </div>

    <!-- Description -->
    <div class="section">
      <h2>Description</h2>
      <textarea name="description" rows="4" placeholder="Describe your place..."></textarea>
    </div>

    <!-- Amenities -->
    <div class="section">
      <h2>Amenities</h2>

      <div class="amenities">
        <label><input type="checkbox" name="amenities[]" value="WiFi"> WiFi</label>
        <label><input type="checkbox" name="amenities[]" value="Air Conditioning"> Air Conditioning</label>
        <label><input type="checkbox" name="amenities[]" value="Kitchen"> Kitchen</label>
        <label><input type="checkbox" name="amenities[]" value="Washing Machine"> Washing Machine</label>
        <label><input type="checkbox" name="amenities[]" value="Free Parking"> Free Parking</label>
      </div>
    </div>

    <!-- Host -->
    <div class="section">
      <h2>Host Details</h2>

      <input type="text" name="host[name]" placeholder="Host Name">
      <input type="text" name="host[joined]" placeholder="Joined Year">

      <select name="host[superhost]">
        <option value="true">Superhost</option>
        <option value="false">Not a Superhost</option>
      </select>
    </div>

    <button type="submit">Publish Listing</button>

  </form>
</div>

</body>
</html>
