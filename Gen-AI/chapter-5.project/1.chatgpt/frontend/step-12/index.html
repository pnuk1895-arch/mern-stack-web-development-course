<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>ChatDpt</title>
</head>
<body>
    <div class="container">
         <div class="sidebar">
               <div class="sidebar-header">
                    <button class="new-chat-btn">
                        + New Chat
                    </button>

                </div>
                <div class="chat-list">

                    <div class="chat-item">HTML Basics</div>
                    <div class="chat-item">CSS Flexbox</div>
                    <div class="chat-item">JavaScript DOM</div>
                    <div class="chat-item">React Interview</div>

                </div>
          </div>

            <div class="main">

                  <div class="chat-container">

                      <div class="welcome-screen" id="welcome-screen">
  
                         <h1>ChatGPT Clone</h1>
  
                          <p>
                              How can I help you today?
                          </p>
  
                      </div>

                      <div class="messages" id="messages">

                        <div class="message user">
<!-- 
                            <div class="avatar">
                                👤
                            </div>

                            <div class="message-content">
                                Hello ChatGPT!
                            </div> -->

                        </div>

                        <div class="message ai">

                            <!-- <div class="avatar">
                                🤖
                            </div>

                            <div class="message-content">
                                Hi! How can I help you today?
                            </div> -->

                        </div>

                      </div>
                                        
                        
                

                     <div class="input-area">

                        <input
                            id="message-input"
                            type="text"
                            placeholder="Message ChatGPT..."
                        >

                        <button id="send-btn">
                            ➤
                        </button>

                    </div>
                      
                </div>
            </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
